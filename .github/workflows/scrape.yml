name: NHL Data Scraper

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Create data directory
        run: mkdir -p data

      - name: Run NHL scraper
        run: python scripts/scraper.py

      - name: Commit and push data files
        run: |
          git config user.name "NHL Data Bot"
          git config user.email "nhl-bot@github-actions"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "NHL data update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
